!
! Lab QoS framework — Cisco IOS (vIOS-compatible), hierarchical shaper + child queueing
! Derived from a 500 Mbps production MPLS WAN policy, scaled 500:1 for a 1 Mbps virtual WAN
!
! Note: production-side 'account user-defined 24' (L2 overhead accounting on IOS-XE
! ASR/ISR) is dropped here — vIOS does not support that keyword. Proportional split
! is unchanged; bandwidth math is just slightly less L2-precise. Re-add on real
! IOS-XE platforms by appending 'account user-defined 24' to each bandwidth/shape.
!
! Apply on the WAN-facing interface of the lab CE router:
!   interface GigabitEthernet0/0
!     service-policy output LAB-EAD-POUT
!     service-policy input  LAB-EAD-IN
!
! Allocation under full congestion (priority + remaining-ratio split of ~876 Kbps):
!   EF   ≤  123 Kbps   (priority + policer)
!   NC   ~   26 Kbps   (ratio  30 / 1014) — routing/control, no WRED, no policer
!   AF4  ~  302 Kbps   (ratio 350 / 1014)
!   AF3  ~  270 Kbps   (ratio 313 / 1014)
!   AF2  ~  130 Kbps   (ratio 150 / 1014)
!   AF1  ~   54 Kbps   (ratio  62 / 1014)
!   DE   ~   85 Kbps   (ratio  98 / 1014)
!   Mgmt ~   10 Kbps   (ratio  11 / 1014)
!
! ===== class-maps (egress) =====
class-map match-any ce_ef_output
 match dscp cs5  ef
class-map match-any ce_af4_output
 match dscp cs4  af41  af42  af43
class-map match-any ce_af3_output
 match dscp cs3  af31  af32  af33
class-map match-any ce_af2_output
 match dscp cs2  af21  af22  af23
class-map match-any ce_af1_output
 match dscp cs1  af11  af12  af13
class-map match-any ce_mgmt_bun_output
 match access-group 199
class-map match-any ce_nc_output
 match dscp cs6  cs7
!
! ===== class-maps (ingress, accounting only) =====
class-map match-any ce_ef_input
 match mpls experimental topmost 5
class-map match-any ce_af4_input
 match mpls experimental topmost 4
class-map match-any ce_af3_input
 match mpls experimental topmost 3
 match dscp cs3  af31  af32  af33
class-map match-any ce_af2_input
 match mpls experimental topmost 2
class-map match-any ce_af1_input
 match mpls experimental topmost 1
class-map match-any ce_nc_input
 match mpls experimental topmost 6
!
! ===== ingress policy (accounting) =====
policy-map LAB-EAD-IN
 class ce_ef_input
 class ce_af1_input
 class ce_af2_input
 class ce_af3_input
 class ce_af4_input
 class class-default
!
! ===== egress child policy (queueing) =====
policy-map LAB-EAD-OUT
 description 1000K CDR | 123K EF | 26K NC | 302K AF4 | 270K AF3 | 130K AF2 | 54K AF1 | 85K DE
 class ce_mgmt_bun_output
  bandwidth remaining ratio 11
  queue-limit 64 packets
  random-detect
  random-detect exponential-weighting-constant 8
 class ce_ef_output
  priority
  police 123344 1500 1500 conform-action set-dscp-transmit ef exceed-action drop violate-action drop
  ! 'set cos 5' from production policy intentionally omitted — only valid on
  ! 802.1Q/ISL trunk subinterfaces. Lab CE→server link is untagged L3.
 class ce_nc_output
  bandwidth remaining ratio 30
  queue-limit 64 packets
  ! Network Control (CS6/CS7) — routing protocols (OSPF, BGP, IS-IS, HSRP, ...).
  ! Deliberately NO random-detect: WRED-dropping a Hello/keepalive tears down
  ! adjacencies. Deliberately NO police: cannot rate-cap routing traffic.
 class ce_af4_output
  bandwidth remaining ratio 350
  queue-limit 64 packets
  random-detect dscp-based
  random-detect exponential-weighting-constant 13
 class ce_af3_output
  bandwidth remaining ratio 313
  queue-limit 64 packets
  random-detect dscp-based
  random-detect exponential-weighting-constant 13
 class ce_af2_output
  bandwidth remaining ratio 150
  queue-limit 64 packets
  random-detect dscp-based
  random-detect exponential-weighting-constant 12
 class ce_af1_output
  bandwidth remaining ratio 62
  queue-limit 64 packets
  random-detect dscp-based
  random-detect exponential-weighting-constant 10
 class class-default
  bandwidth remaining ratio 98
  queue-limit 64 packets
  random-detect
  random-detect exponential-weighting-constant 11
!
! ===== egress parent policy (1 Mbps shaper) =====
policy-map LAB-EAD-POUT
 description 1Mbps shaped — parent of LAB-EAD-OUT
 class class-default
  shape average 1000000
  service-policy LAB-EAD-OUT
!
